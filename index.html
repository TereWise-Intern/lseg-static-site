<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多市場報酬與波動排名</title>
<style>
*{box-sizing:border-box} body{font-family:-apple-system,"Segoe UI","Microsoft JhengHei",sans-serif;margin:0;background:#0f1115;color:#e4e6eb}
header{padding:14px 20px;border-bottom:1px solid #2a2f3a;background:#161922;position:sticky;top:0;z-index:10;display:flex;align-items:baseline;justify-content:space-between;gap:18px;flex-wrap:wrap}
h1{margin:0;font-size:20px;font-weight:650}.meta{font-size:16px;color:#dbe2f5}.meta .hl{color:#4a7cff;font-weight:650}
nav{display:flex;gap:8px;align-items:center}nav a{padding:6px 10px;border:1px solid #2a2f3a;border-radius:4px;background:#1c2030;color:#9db7ff;text-decoration:none;font-size:13px}nav a.active{background:#2d4a8a;border-color:#4a7cff;color:#fff}
.controls{padding:12px 20px;border-bottom:1px solid #2a2f3a;background:#13161e;display:flex;flex-wrap:wrap;gap:12px;align-items:center}
.controls label{font-size:12px;color:#a8b0c2;display:flex;align-items:center;gap:4px}input,select,button{background:#1c2030;color:#e4e6eb;border:1px solid #2a2f3a;padding:6px 10px;border-radius:4px;font-size:13px}input:focus,select:focus{outline:none;border-color:#4a7cff}button{cursor:pointer}button:hover{background:#252b3d}
.market-tabs{display:flex;gap:6px}.market-tabs button{min-width:96px}.market-tabs button.active,.toggle-btn.active{background:#2d4a8a;border-color:#4a7cff;color:#fff}
.col-toggle{display:flex;flex-wrap:wrap;gap:4px;padding:8px 20px;background:#13161e;border-bottom:1px solid #2a2f3a}.chip{font-size:11px;padding:3px 8px;border-radius:12px;border:1px solid #2a2f3a;background:#1c2030;cursor:pointer;user-select:none}.chip.on{background:#2d4a8a;border-color:#4a7cff;color:#fff}
.table-wrap{overflow:auto;max-height:calc(100vh - 220px)}table{width:100%;border-collapse:collapse;font-size:13px}thead th{position:sticky;top:0;background:#1c2030;padding:8px 10px;text-align:left;border-bottom:1px solid #2a2f3a;cursor:pointer;white-space:nowrap}thead th.sorted-asc::after{content:" ▲";color:#4a7cff}thead th.sorted-desc::after{content:" ▼";color:#4a7cff}tbody td{padding:6px 10px;border-bottom:1px solid #1f2330;white-space:nowrap}tbody tr:hover{background:#181c28}tbody tr.top{background:rgba(74,124,255,.08)}tr.group-row{background:#222838;cursor:pointer}.group-stats{font-weight:400;color:#9ba6c4;font-size:12px;margin-left:8px}.pos{color:#3fcf8e}.neg{color:#ff5f6d}.num{text-align:right;font-variant-numeric:tabular-nums}.footer{padding:8px 20px;font-size:11px;color:#6b7185;border-top:1px solid #2a2f3a}
@media(max-width:768px){header{padding:10px 12px}h1{font-size:16px}.meta{font-size:13px}.controls{padding:8px 12px;gap:8px}.controls input,.controls select,.controls button{font-size:12px;padding:5px 8px}.col-toggle{display:none}.table-wrap{max-height:calc(100vh - 200px)}table{font-size:11px}}
</style>
</head>
<body>
<header>
  <h1 id="title">多市場報酬與波動排名</h1>
  <nav><a class="active" href="index.html">排名頁</a><a href="hsp.html">HSP</a><a href="tp.html">TP</a></nav>
  <div class="meta" id="meta">載入中...</div>
</header>
<div class="controls">
  <div class="market-tabs" id="marketTabs"></div>
  <input id="search" type="text" placeholder="搜尋 RIC / 公司名" style="width:200px;">
  <label>市值前 <input id="mcapTop" type="number" value="100" min="0" max="1000" style="width:70px;"> 名（0=全部）</label>
  <label>排序：<select id="sortCol"></select></label>
  <select id="sortDir"><option value="desc">由大到小</option><option value="asc">由小到大</option></select>
  <label>高亮前 <input id="topN" type="number" value="10" min="0" max="500" style="width:60px;"> 名</label>
  <button id="groupBtn" class="toggle-btn">產業分組</button>
  <button id="expandAllBtn">全展開</button>
  <button id="collapseAllBtn">全收合</button>
  <button id="exportBtn">匯出 CSV</button>
  <span style="color:#8b93a7;font-size:12px;" id="count"></span>
</div>
<div class="col-toggle" id="colToggle"></div>
<div class="table-wrap"><table id="tbl"><thead><tr id="thead"></tr></thead><tbody id="tbody"></tbody></table></div>
<div class="footer">資料來源：LSEG；報酬與波動由 adj_close 計算，波動已年化（×√252），市值排名依各市場本地幣別分別排序。</div>
<script>
let ALL_DATA=[], DATA=[], MARKETS=[], MARKET_META={}, DATA_DATE=null;
const COLS=[
 {key:'mcap_rank',label:'市值名次',type:'num',fmt:v=>v==null?'-':'#'+v,defaultVis:false},
 {key:'ric',label:'RIC',type:'str',fmt:v=>v,defaultVis:true},
 {key:'market',label:'市場',type:'str',fmt:v=>v,defaultVis:false},
 {key:'name_zh',label:'公司',type:'str',fmt:v=>v||'-',defaultVis:true},
 {key:'company_name',label:'英文名',type:'str',fmt:v=>v||'-',defaultVis:false},
 {key:'sector',label:'類股',type:'str',fmt:v=>v||'-',defaultVis:true},
 {key:'market_cap',label:'市值(M)',type:'num',fmt:v=>v==null?'-':v.toLocaleString(undefined,{maximumFractionDigits:0}),defaultVis:true},
 {key:'date',label:'日期',type:'str',fmt:v=>v,defaultVis:false},
 {key:'close',label:'收盤',type:'num',fmt:v=>v==null?'-':v.toFixed(2),defaultVis:true},
 {key:'volume',label:'成交量',type:'num',fmt:v=>v==null?'-':v.toLocaleString(),defaultVis:false},
 {key:'ret_1d',label:'日報酬',type:'pct',fmt:v=>fmtPct(v),defaultVis:true},
 {key:'ret_1w',label:'週報酬',type:'pct',fmt:v=>fmtPct(v),defaultVis:false},
 {key:'ret_1m',label:'月報酬',type:'pct',fmt:v=>fmtPct(v),defaultVis:false},
 {key:'vol_5',label:'5日波動',type:'pct',fmt:v=>fmtVol(v),defaultVis:true},
 {key:'vol_20',label:'20日波動',type:'pct',fmt:v=>fmtVol(v),defaultVis:true},
 {key:'vol_60',label:'60日波動',type:'pct',fmt:v=>fmtVol(v),defaultVis:true},
 {key:'imp_volt',label:'IMP_VOLT',type:'pct',fmt:v=>fmtVol(v),defaultVis:true},
 {key:'vol_ratio',label:'波動比值(5日/60日)',type:'num',fmt:v=>v==null||isNaN(v)?'-':v.toFixed(2),defaultVis:true}
];
function fmtPct(v){return v==null||isNaN(v)?'-':(v*100).toFixed(2)+'%'} function fmtVol(v){return v==null||isNaN(v)?'-':(v*100).toFixed(1)+'%'} function avg(a){const v=a.filter(x=>x!=null&&!isNaN(x));return v.length?v.reduce((x,y)=>x+y,0)/v.length:null}
let state={market:'US',visible:new Set(COLS.filter(c=>c.defaultVis).map(c=>c.key)),sortKey:'market_cap',sortDir:'desc',search:'',mcapTop:100,topN:10,grouped:false,collapsed:new Set()};
const sortColEl=document.getElementById('sortCol');COLS.forEach(c=>{const o=document.createElement('option');o.value=c.key;o.textContent=c.label;sortColEl.appendChild(o)});sortColEl.value=state.sortKey;
const ctEl=document.getElementById('colToggle');COLS.forEach(c=>{const el=document.createElement('span');el.className='chip'+(state.visible.has(c.key)?' on':'');el.textContent=c.label;el.onclick=()=>{state.visible.has(c.key)?state.visible.delete(c.key):state.visible.add(c.key);el.classList.toggle('on');render()};ctEl.appendChild(el)});
document.getElementById('search').addEventListener('input',e=>{state.search=e.target.value.toLowerCase();render()});document.getElementById('mcapTop').addEventListener('input',e=>{state.mcapTop=parseInt(e.target.value)||0;render()});sortColEl.addEventListener('change',e=>{state.sortKey=e.target.value;render()});document.getElementById('sortDir').addEventListener('change',e=>{state.sortDir=e.target.value;render()});document.getElementById('topN').addEventListener('input',e=>{state.topN=parseInt(e.target.value)||0;render()});document.getElementById('exportBtn').onclick=exportCSV;const groupBtn=document.getElementById('groupBtn');groupBtn.onclick=()=>{state.grouped=!state.grouped;groupBtn.classList.toggle('active',state.grouped);render()};document.getElementById('expandAllBtn').onclick=()=>{state.collapsed.clear();render()};document.getElementById('collapseAllBtn').onclick=()=>{[...new Set(DATA.map(d=>d.sector).filter(Boolean))].forEach(s=>state.collapsed.add(s));render()};
function setMarket(m){state.market=m;state.collapsed.clear();DATA=ALL_DATA.filter(r=>r.market===m);document.querySelectorAll('#marketTabs button').forEach(b=>b.classList.toggle('active',b.dataset.market===m));render()}
function getRows(){let rows=DATA.slice();if(state.mcapTop>0)rows=rows.filter(r=>r.mcap_rank!=null&&r.mcap_rank<=state.mcapTop);if(state.search)rows=rows.filter(r=>(r.ric||'').toLowerCase().includes(state.search)||(r.company_name||'').toLowerCase().includes(state.search)||(r.name_zh||'').toLowerCase().includes(state.search));return rows}
function sortRows(rows){const k=state.sortKey,dir=state.sortDir==='asc'?1:-1;return rows.slice().sort((a,b)=>{let va=a[k],vb=b[k];if(va==null&&vb==null)return 0;if(va==null)return 1;if(vb==null)return-1;if(typeof va==='number')return(va-vb)*dir;return(''+va).localeCompare(''+vb)*dir})}
function render(){const meta=MARKET_META[state.market]||{};document.getElementById('title').textContent=(meta.indexName||state.market)+' 報酬與波動排名';document.getElementById('meta').innerHTML=`共 <span class="hl">${DATA.length}</span> 檔 ｜ 幣別：<span class="hl">${meta.currency||'-'}</span> ｜ 資料日期：<span class="hl">${meta.dataDate||'-'}</span>`;const vis=COLS.filter(c=>state.visible.has(c.key)&&!(state.grouped&&c.key==='sector'));const thead=document.getElementById('thead');thead.innerHTML='';vis.forEach(c=>{const th=document.createElement('th');th.textContent=c.label;if(c.type!=='str')th.className='num';if(c.key===state.sortKey)th.classList.add(state.sortDir==='asc'?'sorted-asc':'sorted-desc');th.onclick=()=>{if(state.sortKey===c.key)state.sortDir=state.sortDir==='asc'?'desc':'asc';else{state.sortKey=c.key;state.sortDir=c.type==='str'?'asc':'desc'}sortColEl.value=state.sortKey;document.getElementById('sortDir').value=state.sortDir;render()};thead.appendChild(th)});const rows=sortRows(getRows());document.getElementById('count').textContent=`顯示 ${rows.length} / ${DATA.length}`;state.grouped?renderGrouped(rows,vis):renderFlat(rows,vis)}
function tdFor(c,r){const td=document.createElement('td');td.textContent=c.fmt(r[c.key]);if(c.type!=='str')td.classList.add('num');if(c.type==='pct'||c.key==='ret_1d'||c.key==='ret_1w'||c.key==='ret_1m'){const v=r[c.key];if(v>0)td.classList.add('pos');if(v<0)td.classList.add('neg')}return td}
function renderFlat(rows,vis){const tb=document.getElementById('tbody');tb.innerHTML='';rows.forEach((r,i)=>{const tr=document.createElement('tr');if(i<state.topN)tr.classList.add('top');vis.forEach(c=>tr.appendChild(tdFor(c,r)));tb.appendChild(tr)})}
function renderGrouped(rows,vis){const tb=document.getElementById('tbody');tb.innerHTML='';const groups={};rows.forEach(r=>(groups[r.sector||'未分類']??=[]).push(r));Object.entries(groups).sort((a,b)=>b[1].length-a[1].length).forEach(([sector,items])=>{const gr=document.createElement('tr');gr.className='group-row';const td=document.createElement('td');td.colSpan=vis.length;td.innerHTML=`${state.collapsed.has(sector)?'▶':'▼'} ${sector}<span class="group-stats">${items.length} 檔 ｜ 平均日報酬 ${fmtPct(avg(items.map(x=>x.ret_1d)))} ｜ 平均20日波動 ${fmtVol(avg(items.map(x=>x.vol_20)))}</span>`;gr.onclick=()=>{state.collapsed.has(sector)?state.collapsed.delete(sector):state.collapsed.add(sector);render()};gr.appendChild(td);tb.appendChild(gr);if(!state.collapsed.has(sector))items.forEach((r,i)=>{const tr=document.createElement('tr');if(i<state.topN)tr.classList.add('top');vis.forEach(c=>tr.appendChild(tdFor(c,r)));tb.appendChild(tr)})})}
function exportCSV(){const rows=sortRows(getRows());const vis=COLS.filter(c=>state.visible.has(c.key));const csv=[vis.map(c=>c.label).join(',')].concat(rows.map(r=>vis.map(c=>`"${String(c.fmt(r[c.key])).replaceAll('"','""')}"`).join(','))).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));a.download=`ranking_${state.market}.csv`;a.click()}
async function loadRankingData(){try{const res=await fetch('data/ranking.json',{cache:'no-store'});if(!res.ok)throw new Error('HTTP '+res.status);const payload=await res.json();ALL_DATA=payload.records||[];MARKETS=payload.markets||[];MARKET_META=Object.fromEntries(MARKETS.map(m=>[m.market,m]));const tabs=document.getElementById('marketTabs');tabs.innerHTML='';MARKETS.forEach(m=>{const b=document.createElement('button');b.textContent=m.indexName;b.dataset.market=m.market;b.onclick=()=>setMarket(m.market);tabs.appendChild(b)});setMarket(MARKETS[0]?.market||'US')}catch(err){document.getElementById('meta').innerHTML='<span class="hl">資料載入失敗</span>';document.getElementById('count').textContent='Cannot load data/ranking.json. Use a static web server instead of opening file:// directly.';console.error(err)}}
loadRankingData();
</script>
</body>
</html>
